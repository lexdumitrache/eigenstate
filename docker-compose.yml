services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    environment:
      - EIGENSTATE_LLM=${EIGENSTATE_LLM:-anthropic}
    ports:
      - "8000:8000"   # direct API access (optional — remove for prod)
    volumes:
      - feedback_data:/app/backend/feedback_log.json

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  feedback_data:
